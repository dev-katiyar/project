<p-table #dt [value]="technicals" [rows]="5" [pageLinks]="3" [rowsPerPageOptions]="[5, 10, 20]"
    styleClass="p-datatable-positions p-datatable-striped" [paginator]="false" [autoLayout]="true">

    <ng-template pTemplate="header">
        <tr>
            <th style="text-align: left;" *ngIf="showChartIcon"></th>
            <th style="text-align: left;">Symbol</th>
            <th>Yield</th>
            <th pSortableColumn="priceChange">
                Yield Change
                <p-sortIcon field="priceChange"></p-sortIcon>
            </th>
            <!-- <th>% Change</th> -->
        </tr>
    </ng-template>

    <ng-template pTemplate="body" let-technical>
        <tr>
            <td style="width: fit-content; text-align: center;" *ngIf="showChartIcon">
                <i (click)="onChartClick(technical.symbol)" class="pi pi-chart-line" [ngClass]="{'selected-item': technical.symbol === this.clickedSymbol}"
                    title="Trend Chart vs SPY" style="font-size: 1.15rem; cursor: pointer;">
                </i>
              </td>
            <td>
                <div (click)="onSymbolClick(technical.symbol)" class="symbol p-text-left p-p-1">
                    {{ symbolNameDict[technical.symbol]}}
                </div>
            </td>

            <td>
                <div>
                    {{ technical.price | number: '0.2-2' }}%
                </div>
            </td>

            <td>
                <div [ngClass]="technical.priceChange | upDownColor">
                    {{ technical['priceChange'] | number: '0.2-2' }}%
                </div>
            </td>

            <!-- <td>
                <div [ngClass]="technical.priceChange | upDownColor">
                    {{ technical['priceChangePct'] | number: '0.2-2' }}%
                </div>
            </td> -->
        </tr>
    </ng-template>
</p-table>
