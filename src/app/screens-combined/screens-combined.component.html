<div class="p-grid" [ngStyle]="{'margin': showMinimalView ? '-0.75rem': '-0.50rem'}">
    <!-- Screener Boxes - Summary View -->
    <div *ngIf="!showMinimalView" class="p-col-12 p-p-1">
        <div class="p-grid">
            <div class="p-col-12 p-p-1" style="background-color: white;">
                <div class="border-shadow p-p-2">
                    <div style="font-weight: bold; font-size: 1.3rem; padding-bottom: 0;">
                        SimpleVisor Screens
                    </div>

                    <hr style="margin: 0.5rem 0;width: 100%;">

                    <div class="p-col-12 p-p-0">
                        <app-screens-summary [screenSummData]="svScreensSumm" [isMinimalView]="showMinimalView"
                            [selectedPreset]="selectedPreset" (runScreenClick)="onSVRunScreenClick($event)"
                            (newScreenClick)="onCreateNewScreenClick()"></app-screens-summary>
                    </div>
                </div>
            </div>

            <div class="p-col-12 p-p-1" style="background-color: white;">
                <div class="border-shadow p-p-2">
                    <div class="p-col-12" style="font-weight: bold; font-size: 1.3rem; padding-bottom: 0;">
                        <div class="p-d-flex p-jc-between">
                            My Screens

                            <button pButton type="button" icon="pi pi-plus" label="New Screen"
                                class="p-button-text margin-right sv-button p-py-0" (click)="onCreateNewScreenClick()"
                                pTooltip="Create a new Stock Screen" showDelay="700" [disabled]="isThereANewScreen">
                            </button>
                        </div>
                    </div>

                    <hr style="margin: 0.5rem 0;width: 100%;">

                    <div class="p-col-12">
                        <app-screens-summary [screenSummData]="userScreensSumm" [isMinimalView]="showMinimalView"
                            [selectedPreset]="selectedPreset" (runScreenClick)="onUserRunScreenClick($event)"
                            (newScreenClick)="onCreateNewScreenClick()"></app-screens-summary>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Screnner List - Desk View (List on Left & Details on Right) -->
    <div id="summarySidebar" *ngIf="showMinimalView" class="p-col-3 p-p-1">
        <div class="p-grid p-p-1">
            <div class="p-col-12 p-p-1" style="background-color: white;">
                <div class="border-shadow p-p-2">
                    <div style="font-weight: bold; font-size: 1.3rem; padding-bottom: 0;">
                        SimpleVisor Screens
                    </div>

                    <hr style="margin: 0.5rem 0;width: 100%;">

                    <div class="p-col-12 p-p-0">
                        <app-screens-summary [screenSummData]="svScreensSumm" [isMinimalView]="showMinimalView"
                            [selectedPreset]="selectedPreset" (runScreenClick)="onSVRunScreenClick($event)"
                            (newScreenClick)="onCreateNewScreenClick()"></app-screens-summary>
                    </div>
                </div>
            </div>

            <div class="p-col-12 p-p-1" style="background-color: white;">
                <div class="border-shadow p-p-2">
                    <div class="p-col-12" style="font-weight: bold; font-size: 1.3rem; padding-bottom: 0;">
                        <div class="p-d-flex p-jc-between">
                            My Screens

                            <button pButton type="button" icon="pi pi-plus" label="New Screen"
                                class="p-button-text margin-right sv-button p-py-0" (click)="onCreateNewScreenClick()"
                                pTooltip="Create a new Stock Screen" showDelay="700" [disabled]="isThereANewScreen">
                            </button>
                        </div>
                    </div>

                    <hr style="margin: 0.5rem 0;width: 100%;">

                    <div class="p-col-12">
                        <app-screens-summary [screenSummData]="userScreensSumm" [isMinimalView]="showMinimalView"
                            [selectedPreset]="selectedPreset" (runScreenClick)="onUserRunScreenClick($event)"
                            (newScreenClick)="onCreateNewScreenClick()"></app-screens-summary>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Screener Details - On the right side -->
    <div id="screenDetails" *ngIf="showMinimalView" class="p-col-9 p-p-1" style="background-color: white;">
        <div class="border-shadow p-p-2">
            <div class="p-grid">
                <div class="p-col-12" style="font-weight: bold; font-size: 1.5rem; padding-bottom: 0;">
                    <div class="p-grid">
                        <div class="p-col p-d-flex p-ai-center" style="padding-bottom: 0;">
                            <i class="pi pi-arrow-circle-left p-mr-2" (click)="onCloseScreensDetailsClick()"
                                pTooltip="Close to return to all Screens Overview." showDelay="700"
                                style="font-size: 1.3rem;color: #004b8e; font-weight: bold;cursor: pointer;"></i>
                            {{ selectedPreset.preset_name }}
                        </div>

                        <div class="p-col-fixed" style="text-align: right; padding-bottom: 0;">
                            <button *ngIf="!hideManageScreen() && !isNewScreen()" pButton type="button" label="Save"
                                icon="pi pi-save" class="p-button-sm margin-right" style="margin-right: 0.5rem;"
                                pTooltip="Save current filters as Preset Screen in your account." showDelay="700"
                                (click)="onSaveUpdatedPresetClick()"></button>

                            <button pButton type="button" label="Save as New" icon="pi pi-save" class="p-button-sm"
                                style="margin-right: 0.5rem;"
                                pTooltip="Save current filters as new Preset Screen in your accuont." showDelay="700"
                                (click)="onSaveNewPresetClick()"></button>

                            <button *ngIf="!hideManageScreen() && !isNewScreen()" pButton type="button"
                                icon="pi pi-trash" class="p-button-text margin-right sv-button"
                                (click)="onDeleteScreenClick($event)"
                                pTooltip="Delete this Preset Screen from your account." showDelay="700"
                                style="margin-right: 0.5rem;"></button>

                            <p-confirmPopup></p-confirmPopup>
                        </div>
                    </div>
                </div>

                <div class="p-col-12 p-py-0">
                    <hr style="margin: 0.5rem 0 0 0; width: 100%;">
                </div>

                <div class="p-col-12">
                    <app-screen-filter2024 [selectedPresetId]="selectedPreset?.preset_id"
                        [saveUpdatedBtnClickObs]="updateScreenSubject.asObservable()"
                        [saveNewBtnClickObs]="saveNewScreenSubject.asObservable()"
                        (newPresetSaved)="onNewPresetSaved($event)"></app-screen-filter2024>
                </div>
            </div>
        </div>
    </div>
</div>

<p-dialog header="Save Preset" showEffect="fade" [(visible)]="displaySaveDialog" [modal]="true">
    <div>
        <div class="form-group">
            <label for="name" style="margin-right:58px;">Preset Name: </label>

            <input [(ngModel)]="newPresetName" id="name" pInputText placeholder="Enter Name"
                class="saveInput form-control" #name="ngModel" required name="name" (click)="$event.target.select()" />

            <div *ngIf="name.invalid && (name.dirty || name.touched)" class="alert" style="margin-top:7px;">
                <div style="margin-left:70px;" *ngIf="name.errors?.required" class="error-msg">
                    Name is required.
                </div>
            </div>
        </div>
    </div>

    <p-footer>
        <button [disabled]="! (name.valid)" pButton type="button" icon="pi pi-save" (click)="saveNewPreset()"
            label="Save" style="margin-right:120px;cursor:pointer;" class="p-button-success">
        </button>
    </p-footer>
</p-dialog>
