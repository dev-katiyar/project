<div *ngIf="savedStrategies" class="p-grid">
    <div *ngFor="let row of savedStrategies" class="p-col-12 p-sm-6 p-md-4 p-lg-4 p-xl-3" style="margin-bottom: 1rem;">
        <p-card>
            <div class="p-grid" style="padding: 1rem 0;">
                <div class="p-col-12">
                    <img style="width: 100%; height: 180px; object-fit: cover;"
                         src="assets/images/screens/{{row.image}}.png">
                </div>

                <div class="p-col-12" style="height: 4rem; font-size:18px;font-weight:bold; padding: 1rem;">
                    <div class="center">{{row.name}}</div>
                </div>

                <div class="p-col-12" style="height: 5rem; padding: 0.5rem;">
                    <div class="center">{{row.description}}</div>
                </div>

                <div class="p-col-12 center">
                    <a pButton class="p-button-success" (click)="onRunClicked(row)">RUN</a>
                </div>
            </div>
        </p-card>
    </div>
</div>
