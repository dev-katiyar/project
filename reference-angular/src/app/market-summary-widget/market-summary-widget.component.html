<div class="sv-center" style="max-width: 330px;">
    <div class="p-grid" *ngIf="summData">
        <div class="p-col-12" style="margin-top:0">
            <span class="btn-group">
                <input type="button" value="1D" class="btn-normal" [ngClass]="(selPxKey=='priceChangePct')?'btn-green':'btn-blue'" (click)="periodChanged('priceChangePct')">
                <input type="button" value="WTD" class="btn-normal" [ngClass]="(selPxKey=='wtd')?'btn-green':'btn-blue'"
                    (click)="periodChanged('wtd')">
                <input type="button" value="MTD" class="btn-normal" [ngClass]="(selPxKey=='mtd')?'btn-green':'btn-blue'"
                    (click)="periodChanged('mtd')">
                <input type="button" value="QTD" class="btn-normal" [ngClass]="(selPxKey=='qtd')?'btn-green':'btn-blue'"
                    (click)="periodChanged('qtd')">
                    <input type="button" value="YTD" class="btn-normal" [ngClass]="(selPxKey=='ytd')?'btn-green':'btn-blue'"
                    (click)="periodChanged('ytd')">
                <input type="button" value="1Y" class="btn-normal" [ngClass]="(selPxKey=='1year')?'btn-green':'btn-blue'"
                    (click)="periodChanged('1year')">
                    <input type="button" value="2Y" class="btn-normal" [ngClass]="(selPxKey=='2year')?'btn-green':'btn-blue'"
                    (click)="periodChanged('2year')">
                <!-- <input type="button" value="3Y" class="btn-normal" [ngClass]="(period=='3year')?'btn-green':'btn-blue'"
                    (click)="periodChanged('3year')"> -->
            </span>
        </div>

        <div class="p-col-12">
            <div class="p-grid">
                <div class="p-col-3"></div>
                <div class="p-col-3 p-text-center" *ngFor="let co of colOrder">{{ co }}</div>
            </div>
        </div>

        <div class="p-col-12 p-p-1" *ngFor="let row of summData | keyvalue">
            <div class="p-grid">
                <div class="p-col-3 container-div-horz-vertical">
                    {{ row.key }}
                </div>

                <div class="p-col-3" *ngFor="let co of colOrder">
                    <div 
                        class="stock-box container-div-horz-vertical" 
                        [ngClass]="getStockClass(row.value[co][selPxKey])"
                        [pTooltip]="row.value[co]['symbol']" 
                        tooltipPosition="top"
                    >
                        {{ row.value[co][selPxKey] | number:'0.2-2' }}%
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
