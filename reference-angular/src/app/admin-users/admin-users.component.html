<div class="p-grid" style="margin-top:20px;">
    <div class="p-col-12 p-md-3 p-lg-2">
        <input [(ngModel)]="text" placeholder="Enter User" pInputText (click)="$event.target.select()"/>
    </div>

    <div class="p-col-12 p-md-3 p-lg-2">
        <button style="float:right;" type="button" class="p-button-success" pButton
                label="Get Users" (click)="getAllUserDetail()" [disabled]="loading">
        </button>
    </div>

    <div class="p-col-12 p-md-3 p-lg-2">
        <button style="float:right;" type="button" class="p-button-info" pButton
                 label="Add New User" (click)="addNewUser()">
        </button>
    </div>

    <div class="p-col-12 p-md-3 p-lg-2">
        <button type="button" pButton label="Export To Csv" (click)="dt.exportCSV()">
            <i class="pi pi-file-excel"></i>
        </button>
    </div>
</div>

<p-table #dt [columns]="cols" [value]="userDetailList" [paginator]="false" [rows]="10" [pageLinks]="3" [rowsPerPageOptions]="[5,10,20]"
         [resizableColumns]="false" [autoLayout]="true"
         styleClass="p-datatable-positions p-datatable-striped" [tableStyle]="{'table-layout':'auto'}" [scrollable]="false">

    <ng-template pTemplate="header">
        <tr>
            <th pSortableColumn="userId">
                User ID
                <p-sortIcon field="userId"></p-sortIcon>
            </th>
            <th pSortableColumn="username">
                Username
                <p-sortIcon field="username"></p-sortIcon>
            </th>
            <th pSortableColumn="password">
                Password
                <p-sortIcon field="password"></p-sortIcon>
            </th>
            <th pSortableColumn="firstName">
                First Name
                <p-sortIcon field="firstName"></p-sortIcon>
            </th>
            <th pSortableColumn="lastName">
                Last Name
                <p-sortIcon field="lastName"></p-sortIcon>
            </th>
            <th pSortableColumn="emailAddress">
                Email Address
                <p-sortIcon field="emailAddress"></p-sortIcon>
            </th>
            <th pSortableColumn="isPaid">
                isPaid
                <p-sortIcon field="isPaid"></p-sortIcon>
            </th>
            <th pSortableColumn="substype">
                Sub Type
                <p-sortIcon field="substype"></p-sortIcon>
            </th>
            <th pSortableColumn="date">
                Start Date
                <p-sortIcon field="date"></p-sortIcon>
            </th>
            <th pSortableColumn="promoCode">
                Promo Code
                <p-sortIcon field="promoCode"></p-sortIcon>
            </th>
            <th pSortableColumn="action">
                Action
                <p-sortIcon field="action"></p-sortIcon>
            </th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
        <tr>
            <td style="text-align:center;min-width: 70px;">
                <div class="symbol-withoutpointer">{{row.userId}}</div>
            </td>
            <td style="text-align:center;min-width: 70px;">
                <div class="center" *ngIf="!row.isEditable">{{row.username}}</div>
                <div class="center" *ngIf="row.isEditable">
                    <input pInputText type="text" [(ngModel)]="row.username" (click)="$event.target.select()">
                </div>
            </td>
            <td style="text-align:center;min-width: 70px;">
                <div class="center" *ngIf="!row.isEditable">{{row.password}}</div>
                <div class="center" *ngIf="row.isEditable">
                    <input pInputText type="text" [(ngModel)]="row.password" (click)="$event.target.select()">
                </div>
            </td>
            <td style="text-align:center;min-width: 70px;">
                <div class="center" *ngIf="!row.isEditable">{{row.firstName}}</div>
                <div class="center" *ngIf="row.isEditable">
                    <input pInputText type="text" [(ngModel)]="row.firstName" (click)="$event.target.select()">
                </div>
            </td>
            <td style="text-align:center;min-width: 70px;">
                <div class="center" *ngIf="!row.isEditable">{{row.lastName}}</div>
                <div class="center" *ngIf="row.isEditable">
                    <input pInputText type="text" [(ngModel)]="row.lastName" (click)="$event.target.select()">
                </div>
            </td>
            <td style="text-align:center;min-width: 70px;">
                <div class="center" *ngIf="!row.isEditable">{{row.emailAddress}}</div>
                <div class="center" *ngIf="row.isEditable">
                    <input pInputText type="text" [(ngModel)]="row.emailAddress" (click)="$event.target.select()">
                </div>
            </td>
            <td style="text-align:center;min-width: 70px;">
                <div class="center" *ngIf="!row.isEditable">{{row.isPaid}}</div>
                <div class="center" *ngIf="row.isEditable">
                    <input pInputText type="text" [(ngModel)]="row.isPaid" (click)="$event.target.select()">
                </div>
            </td>
            <td style="text-align:center;min-width: 70px;">
                <div class="center" *ngIf="!row.isEditable">{{row.substype}}</div>
                <div class="center" *ngIf="row.isEditable">
                    <p-dropdown name="substype" appendTo="body"  [options]='subscriptionType' [(ngModel)]='row.substype'  optionValue="id" optionLabel='name'>
                    </p-dropdown>
                </div>
            </td>
            <td style="text-align:center;min-width: 70px;">
                <div class="center">
                    {{row.date}}
                </div>
            </td>
            <td>
                <div class="center">
                    {{row.promoCode}}
                </div>
            </td>
            <td>
                <button style="margin-bottom:5px;" type="button" class="p-button-success" pButton label="Save"
                        (click)="saveUserData(row)">
                </button>
                <button type="button" class="p-button-info" pButton label="Edit"
                        (click)="editUserData(row)">
                </button>
            </td>
        </tr>
    </ng-template>
</p-table>
