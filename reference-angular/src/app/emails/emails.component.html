<p-panel header="Daily Emails">
    <div class="p-grid p-fluid p-jc-center">
        <div class="p-col-12 sv-center">
            <h5 class="register">Click to Subscribe/Unsubscribe Daily Emails</h5>
        </div>
    
        <div class="p-col-12 p-md-3">
            <button type="button" pButton (click)="emailSubscription('subscribe')" class="form-control p-button-info"
                label="Subscribe Email">
            </button>
        </div>
    
        <div class="p-col-12 p-md-3">
            <button type="button" pButton (click)="emailSubscription('unsubscribe')" class="form-control p-button-danger"
                label="Unsubscribe Email">
            </button>
        </div>
    </div>
</p-panel>
