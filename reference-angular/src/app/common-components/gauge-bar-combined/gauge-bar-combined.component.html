<div class="p-grid">
    <div class="p-col-12 p-sm-7" style="padding-top: 2.5rem;">
        <app-bar-chart yAxisTitle="Momentum" [chartData]="chartData" chartType="column"></app-bar-chart>
    </div>

    <div class="p-col-12 p-sm-5">
        <app-stocks-gauge gaugeClass="chart-gauge-small2" [valueGauge]="valueGauge" [valueText]="valueText" minValue=0
            maxValue=100></app-stocks-gauge>
    </div>
</div>
