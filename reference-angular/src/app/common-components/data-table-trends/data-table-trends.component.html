<p-table #dt [value]="trends" [rows]="5" [pageLinks]="3" [rowsPerPageOptions]="[5,10,20]"
    styleClass="p-datatable-positions p-datatable-striped" [scrollable]="false" [paginator]="false">
    <ng-template pTemplate="header">
        <tr>
            <th style="text-align:left;">Name</th>
            <th style="width: 12rem;">Day's Change (%)</th>
            <th style="text-align:center; width: 22rem;" class="hide-on-small">Trend Score</th>
            <th class="hide-on-big">Trend Score</th>
        </tr>
    </ng-template>

    <ng-template pTemplate="body" let-trend>
        <tr>
            <td>
                <div style="text-align:left;">{{trend.alternate_name}}</div>
            </td>

            <td>
                <div [ngClass]="trend.priceChange | upDownColor">
                    {{trend['priceChange'] | currency}} ({{trend['priceChangePct'] | number:'0.2-2'}}%)
                </div>
            </td>

            <td class="hide-on-big">
                <div>{{trend.rating}}</div>
            </td>

            <td style="width: 20rem;" class="hide-on-small">
                <div class="p-grid">
                    <div class="p-col-1">
                        {{trend.rating}}
                    </div>
                    <div class="p-col-11">
                        <div [ngStyle]="technicalService.getRatingBackgroundNumeric(trend.rating)"></div>
                    </div>
                </div>
            </td>
        </tr>
    </ng-template>
</p-table>
