# Build docker image for SimpleVisor Pro frontend (test deployment at /pro/ path)
#
# Usage:
#   docker compose -f docker-compose.build-pro.yml build
#   docker compose -f docker-compose.build-pro.yml push   # if using ECR
#
# The built image is what you reference in the main docker-compose.yml
# as the frontend-pro service.

services:
  frontend-pro:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    image: sv_app-frontend_pro
    container_name: sv_app-frontend_pro
