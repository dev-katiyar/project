# HTTP server - redirect to HTTPS
server {
    listen 80;
    server_name simplevisor.com www.simplevisor.com;

    # Increase max upload size
    client_max_body_size 50M;

    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name simplevisor.com www.simplevisor.com;
    root /usr/share/nginx/html;
    index index.html;

    # Increase max upload size
    client_max_body_size 50M;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/2385abfeb55dfde8.crt;
    ssl_certificate_key /etc/nginx/ssl/simplevisor.key;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-AES128-SHA:ECDHE-RSA-AES256-SHA:DHE-RSA-AES128-SHA256:DHE-RSA-AES256-SHA256:DHE-RSA-AES128-SHA:DHE-RSA-AES256-SHA:!aNULL:!eNULL:!EXPORT:!DES:!RC4:!3DES:!MD5:!PSK;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Content Security Policy for TradingView, GTM, Mouseflow, Stripe, reCAPTCHA, and YouTube
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' *.tradingview.com *.googletagmanager.com www.googletagmanager.com *.google-analytics.com *.mouseflow.com cdn.mouseflow.com *.stripe.com js.stripe.com checkout.stripe.com *.google.com *.gstatic.com www.google.com www.gstatic.com *.googleapis.com https://simplevisor.com; connect-src 'self' *.tradingview.com *.googletagmanager.com www.googletagmanager.com *.google-analytics.com *.mouseflow.com *.stripe.com api.stripe.com wss://data.tradingview.com *.google.com www.google.com *.googleapis.com https://simplevisor.com wss://simplevisor.com; frame-src 'self' *.tradingview.com *.stripe.com checkout.stripe.com *.google.com www.google.com *.googletagmanager.com *.youtube.com *.ytimg.com; img-src 'self' data: *.tradingview.com *.googletagmanager.com *.google-analytics.com *.mouseflow.com *.stripe.com *.google.com *.gstatic.com *.ytimg.com i.ytimg.com *.youtube.com *.simplevisorinsights.com simplevisorinsights.com *.realinvestmentadvice.com realinvestmentadvice.com; style-src 'self' 'unsafe-inline' *.tradingview.com *.stripe.com *.google.com *.gstatic.com fonts.googleapis.com; frame-ancestors 'self' *.tradingview.com; font-src 'self' fonts.gstatic.com *.gstatic.com; worker-src 'self' blob:; child-src 'self' blob:;" always;


    # Enable compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Don't cache HTML files to ensure CSP updates
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Angular app routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests
    location /api/ {
        # Handle OPTIONS requests for CORS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://simplevisor.com' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            add_header 'Content-Type' 'text/plain; charset=utf-8' always;
            add_header 'Content-Length' 0 always;
            return 204;
        }

        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://backendapi:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Add CORS headers with specific origin
        add_header 'Access-Control-Allow-Origin' 'https://simplevisor.com' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}